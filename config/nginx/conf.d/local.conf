# =============================================================================
# TelemetryFlow-Viz Local Server Configuration (HTTP Only)
# Use for localhost testing without SSL
# =============================================================================

upstream telemetryflow_landing {
    server telemetryflow-landing:80;
    keepalive 32;
}

upstream telemetryflow_viz {
    server telemetryflow-viz:80;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Landing Page (root)
    location / {
        proxy_pass http://telemetryflow_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Dashboard at /demo
    location /demo {
        proxy_pass http://telemetryflow_viz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support for dashboard
    location /demo/ws {
        proxy_pass http://telemetryflow_viz;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block path traversal attempts
    location ~* \.\. {
        return 403;
    }
}
