openapi: 3.0.3
info:
  title: TelemetryFlow Audit API
  description: Audit logging, querying, and compliance API
  version: 1.0.0

servers:
  - url: /api/v2

tags:
  - name: Audit Logs
    description: Audit log querying and management
  - name: Statistics
    description: Audit statistics and analytics
  - name: Export
    description: Audit log export for compliance

paths:
  /audit/logs:
    get:
      tags: [Audit Logs]
      summary: List audit logs
      operationId: listAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: eventType
          in: query
          schema:
            $ref: '#/components/schemas/AuditEventType'
        - name: result
          in: query
          schema:
            $ref: '#/components/schemas/AuditEventResult'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: resource
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin access required

  /audit/logs/{id}:
    get:
      tags: [Audit Logs]
      summary: Get audit log by ID
      operationId: getAuditLog
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit log details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '404':
          description: Audit log not found

  /audit/logs/count:
    get:
      tags: [Audit Logs]
      summary: Count audit logs
      operationId: countAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: eventType
          in: query
          schema:
            $ref: '#/components/schemas/AuditEventType'
        - name: result
          in: query
          schema:
            $ref: '#/components/schemas/AuditEventResult'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Count result
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /audit/logs/statistics:
    get:
      tags: [Statistics]
      summary: Get audit statistics
      operationId: getAuditStatistics
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [eventType, result, user, organization, day, hour]
      responses:
        '200':
          description: Statistics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditStatistics'

  /audit/logs/user-activity:
    get:
      tags: [Statistics]
      summary: Get user activity statistics
      operationId: getUserActivity
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: User activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserActivityRecord'

  /audit/logs/organization-activity:
    get:
      tags: [Statistics]
      summary: Get organization activity statistics
      operationId: getOrganizationActivity
      security:
        - bearerAuth: []
      parameters:
        - name: organizationId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Organization activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationActivityRecord'

  /audit/logs/export:
    get:
      tags: [Export]
      summary: Export audit logs
      operationId: exportAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: eventType
          in: query
          schema:
            $ref: '#/components/schemas/AuditEventType'
        - name: limit
          in: query
          schema:
            type: integer
            default: 10000
            maximum: 100000
      responses:
        '200':
          description: Export data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
            text/csv:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuditEventType:
      type: string
      enum: [AUTH, AUTHZ, DATA, SYSTEM]
      description: |
        Type of audit event:
        - AUTH: Authentication events (login, logout)
        - AUTHZ: Authorization events (access control)
        - DATA: Data operations (CRUD)
        - SYSTEM: System events (config changes)

    AuditEventResult:
      type: string
      enum: [SUCCESS, FAILURE, DENIED]
      description: |
        Result of the audited operation:
        - SUCCESS: Operation completed successfully
        - FAILURE: Operation failed due to error
        - DENIED: Operation denied due to authorization

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        userId:
          type: string
          format: uuid
        userEmail:
          type: string
        userFirstName:
          type: string
        userLastName:
          type: string
        eventType:
          $ref: '#/components/schemas/AuditEventType'
        action:
          type: string
        resource:
          type: string
        resourceId:
          type: string
        result:
          $ref: '#/components/schemas/AuditEventResult'
        errorMessage:
          type: string
        errorCode:
          type: string
        ipAddress:
          type: string
        userAgent:
          type: string
        requestMethod:
          type: string
        requestPath:
          type: string
        metadata:
          type: object
          additionalProperties: true
        tenantId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        durationMs:
          type: integer
        createdAt:
          type: string
          format: date-time

    AuditStatistics:
      type: object
      properties:
        total:
          type: integer
        byEventType:
          type: object
          additionalProperties:
            type: integer
        byResult:
          type: object
          additionalProperties:
            type: integer
        byDay:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer
        topUsers:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              count:
                type: integer
        topActions:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
              count:
                type: integer

    UserActivityRecord:
      type: object
      properties:
        date:
          type: string
          format: date
        userId:
          type: string
          format: uuid
        eventType:
          $ref: '#/components/schemas/AuditEventType'
        count:
          type: integer

    OrganizationActivityRecord:
      type: object
      properties:
        date:
          type: string
          format: date
        organizationId:
          type: string
          format: uuid
        eventType:
          $ref: '#/components/schemas/AuditEventType'
        result:
          $ref: '#/components/schemas/AuditEventResult'
        count:
          type: integer
